<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SplitTracker">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" id="manifestLink">
<script>
const manifestData={name:"5-Day Split Tracker",short_name:"SplitTracker",
  start_url:".",display:"standalone",background_color:"#0f0f13",theme_color:"#7c5cfc",
  icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f0f13'/%3E%3Ctext y='.9em' font-size='80'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
const mBlob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
document.getElementById('manifestLink').href=URL.createObjectURL(mBlob);
</script>
<title>5-Day Split Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--card:#20202c;--card2:#252534;
  --border:#2a2a3e;--accent:#7c5cfc;--accent2:#5cdbfc;
  --green:#3ddc84;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;
  --text:#eeeef8;--text2:#a0a0c0;--muted:#606080;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;}
#header{flex-shrink:0;padding:calc(var(--safe-top) + 10px) 18px 10px;
  background:linear-gradient(180deg,#12121a 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.logo-sub{font-size:10px;color:var(--muted);font-weight:500;}
.week-pill{background:var(--accent);color:white;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
#dayNav{flex-shrink:0;display:flex;gap:8px;padding:6px 16px 10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
#dayNav::-webkit-scrollbar{display:none;}
.day-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.18s ease;min-width:54px;}
.day-chip.active{background:var(--accent);border-color:var(--accent);transform:scale(1.04);}
.day-chip.done{border-color:var(--green);}
.day-chip.active.done{background:var(--green);border-color:var(--green);}
.chip-icon{font-size:18px;line-height:1;}
.chip-label{font-size:10px;font-weight:700;color:var(--text2);}
.day-chip.active .chip-label,.day-chip.active.done .chip-label{color:white;}
.chip-tag{font-size:9px;color:var(--muted);}
.day-chip.active .chip-tag{color:rgba(255,255,255,0.7);}
#bottomNav{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);}
.bot-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;transition:color 0.2s;}
.bot-tab.active{color:var(--accent);}
.bot-tab-icon{font-size:20px;}
#mainScroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px 20px;}
.day-hero{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:18px;border:1px solid var(--border);margin-bottom:14px;position:relative;overflow:hidden;}
.day-hero::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;opacity:0.08;background:var(--day-color,var(--accent));}
.hero-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.hero-info{flex:1;min-width:0;}
.hero-name{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.done-btn{flex-shrink:0;padding:8px 14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.done-btn.done{background:rgba(61,220,132,0.15);border-color:var(--green);color:var(--green);}
.note-banner{font-size:12px;color:var(--text2);background:var(--card);padding:10px 14px;border-radius:12px;margin-bottom:12px;line-height:1.55;border-left:3px solid var(--accent);}

/* EXERCISE CARD */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.ex-card.open{border-color:var(--accent);}
.ex-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.ex-num{width:28px;height:28px;border-radius:9px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.ex-card.open .ex-num{background:var(--accent);color:white;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;line-height:1.2;}
.ex-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.ex-arrow{color:var(--muted);font-size:11px;transition:transform 0.2s;}
.ex-card.open .ex-arrow{transform:rotate(180deg);color:var(--accent);}
.ex-body{display:none;padding:0 14px 14px;}
.ex-card.open .ex-body{display:block;}

/* DEMO AREA */
.ex-demo{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.ex-img-wrap{width:100%;border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;max-height:200px;}
.ex-img-wrap img{width:100%;height:auto;max-height:200px;object-fit:contain;display:block;}
.ex-img-wrap.no-img{height:0;display:none;}
.ex-demo-right{display:flex;flex-direction:column;gap:6px;}
.ex-note{font-size:11px;color:var(--text2);background:var(--surface);padding:8px 10px;border-radius:9px;line-height:1.5;border-left:2px solid var(--accent);}
.yt-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 10px;border-radius:9px;border:none;background:#ff0000;color:white;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;width:100%;}
.yt-btn:active{opacity:0.8;}

/* SETS */
.sets-head{display:grid;grid-template-columns:32px 1fr 1fr 34px;gap:6px;margin-bottom:5px;}
.sets-head span{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.6px;text-align:center;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 34px;gap:6px;margin-bottom:6px;align-items:center;}
.set-lbl{text-align:center;font-size:12px;font-weight:700;color:var(--muted);height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--surface);}
.set-lbl.warm{color:var(--yellow);background:rgba(251,191,36,0.1);}
.set-inp{height:36px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-weight:600;text-align:center;width:100%;-webkit-appearance:none;transition:border-color 0.2s;}
.set-inp:focus{outline:none;border-color:var(--accent);}
.set-inp::placeholder{color:var(--muted);font-weight:400;font-size:12px;}
.set-chk{width:34px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;flex-shrink:0;}
.set-chk.done{background:rgba(61,220,132,0.15);border-color:var(--green);color:var(--green);}
.prev-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
.prev-hint span{color:var(--accent2);font-weight:600;}
.mtag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;margin-left:5px;vertical-align:middle;text-transform:uppercase;letter-spacing:0.5px;}
.t-legs{background:rgba(168,85,247,.15);color:#c084fc;}
.t-chest{background:rgba(96,165,250,.15);color:#60a5fa;}
.t-back{background:rgba(74,222,128,.15);color:#4ade80;}
.t-shoulders{background:rgba(251,146,60,.15);color:#fb923c;}
.t-arms{background:rgba(248,113,113,.15);color:#f87171;}
.t-abs{background:rgba(251,191,36,.15);color:#fbbf24;}
.rest-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:12px;}
.rest-emoji{font-size:64px;}
.rest-title{font-size:22px;font-weight:700;}
.rest-body{font-size:14px;color:var(--text2);line-height:1.6;max-width:280px;}
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.ov-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;}
.ov-num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.ov-lbl{font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.progress-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.pb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pb-label{font-size:13px;font-weight:700;}
.pb-pct{font-size:13px;font-weight:700;color:var(--accent);}
.pb-track{height:8px;background:var(--surface);border-radius:10px;overflow:hidden;}
.pb-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s ease;}
.week-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.week-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.week-title span:first-child{font-size:13px;font-weight:700;}
.week-title span:last-child{font-size:11px;color:var(--muted);}
.week-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.w-dot{height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.15s;}
.w-dot.completed{background:var(--accent);border-color:var(--accent);}
.w-dot.rest-d{background:rgba(255,255,255,0.03);}
.w-dot.cur-week{box-shadow:0 0 0 2px var(--accent2);}
.notif-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.notif-card h3{font-size:14px;font-weight:700;margin-bottom:4px;}
.notif-card p{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);}
.notif-row-lbl{font-size:13px;font-weight:600;}
.notif-row-sub{font-size:11px;color:var(--muted);}
.toggle{position:relative;width:46px;height:26px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:26px;cursor:pointer;transition:0.2s;}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);}
.time-input{background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;font-weight:600;padding:7px 12px;width:90px;text-align:center;-webkit-appearance:none;}
.time-input:focus{outline:none;border-color:var(--accent);}
.btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--accent),#9b6bfc);color:white;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.1s,opacity 0.2s;margin-top:8px;}
.btn-primary:active{transform:scale(0.97);}
.week-nav-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.week-nav-row button{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:14px;font-weight:700;}
.week-nav-row span{flex:1;text-align:center;font-size:14px;font-weight:700;}
#toast{position:fixed;bottom:calc(60px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all 0.25s ease;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DIET TAB */
.diet-hero{background:linear-gradient(135deg,#1a1a24,#1e1a2e);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;}
.diet-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:var(--orange);opacity:0.06;}
.diet-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:4px;}
.diet-sub{font-size:12px;color:var(--text2);line-height:1.5;}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.macro-box{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--border);}
.macro-num{font-size:16px;font-weight:800;}
.macro-lbl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;}
.meal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none;}
.meal-title{display:flex;align-items:center;gap:8px;}
.meal-icon{font-size:22px;}
.meal-name{font-size:15px;font-weight:700;}
.meal-macros{font-size:11px;color:var(--muted);margin-top:1px;}
.meal-kcal{font-size:13px;font-weight:700;color:var(--orange);}
.meal-arrow{color:var(--muted);font-size:11px;transition:transform 0.2s;}
.meal-card.open .meal-arrow{transform:rotate(180deg);color:var(--accent);}
.meal-card.open{border-color:var(--orange);}
.meal-body{display:none;padding:0 14px 14px;}
.meal-card.open .meal-body{display:block;}
.ing-row{display:grid;grid-template-columns:1fr 60px 48px 36px 36px 36px;gap:4px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center;}
.ing-row:last-child{border-bottom:none;}
.ing-name{font-size:12px;font-weight:600;}
.ing-amt{font-size:11px;color:var(--text2);text-align:center;}
.ing-val{font-size:11px;color:var(--muted);text-align:center;}
.ing-head{display:grid;grid-template-columns:1fr 60px 48px 36px 36px 36px;gap:4px;padding:0 0 6px;margin-bottom:2px;border-bottom:2px solid var(--border);}
.ing-head span{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;text-align:center;}
.ing-head span:first-child{text-align:left;}
.meal-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:8px 10px;background:var(--surface);border-radius:10px;}
.meal-total span{font-size:11px;color:var(--muted);}
.meal-total strong{font-size:13px;color:var(--orange);font-weight:700;}
.diet-note{font-size:11px;color:var(--text2);background:var(--card);padding:10px 14px;border-radius:12px;margin-bottom:12px;line-height:1.55;border-left:3px solid var(--orange);}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon">💪</div>
      <div><div class="logo-text">Split Tracker</div><div class="logo-sub">8 týdenní program</div></div>
    </div>
    <div class="week-pill" id="weekPill">Week 1</div>
  </div>
  <div id="dayNav"></div>
  <div id="mainScroll"></div>
  <nav id="bottomNav">
    <button class="bot-tab active" onclick="setView('workout')" id="tabWorkout"><span class="bot-tab-icon">🏋️</span>Trénink</button>
    <button class="bot-tab" onclick="setView('overview')" id="tabOverview"><span class="bot-tab-icon">📊</span>Přehled</button>
    <button class="bot-tab" onclick="setView('diet')" id="tabDiet"><span class="bot-tab-icon">🥩</span>Jídelníček</button>
    <button class="bot-tab" onclick="setView('settings')" id="tabSettings"><span class="bot-tab-icon">⚙️</span>Nastavení</button>
  </nav>
</div>
<div id="toast"></div>
<script>
const WEEKS=8;

// SVG animations for each exercise type

let S={week:1,day:0,view:'workout',data:{},done:{},notifEnabled:false,notifTime:'08:00',ovWeek:1};
const KEY='splitPWA_v4';
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');
  ['week','day','view','data','done','notifEnabled','notifTime','ovWeek']
  .forEach(k=>{if(d[k]!==undefined)S[k]=d[k];});}catch(e){}}
function getSD(w,id,ei,si){return S.data?.[w]?.[id]?.[ei]?.[si]||{kg:'',reps:'',done:false};}
function putSD(w,id,ei,si,f,v){
  S.data[w]=S.data[w]||{};S.data[w][id]=S.data[w][id]||{};
  S.data[w][id][ei]=S.data[w][id][ei]||{};
  S.data[w][id][ei][si]=S.data[w][id][ei][si]||{kg:'',reps:'',done:false};
  S.data[w][id][ei][si][f]=v;save();}
function isDone(w,id){return!!(S.done?.[w]?.[id]);}
function toggleDone(w,id){S.done[w]=S.done[w]||{};S.done[w][id]=!S.done[w][id];save();}
function totalWorkouts(){let n=0;for(const w in S.done)for(const d in S.done[w]){const day=DAYS.find(x=>x.id===d);if(day&&!day.rest&&S.done[w][d])n++;}return n;}
function weekWorkouts(w){let n=0;const wd=S.done[w]||{};for(const d in wd){const day=DAYS.find(x=>x.id===d);if(day&&!day.rest&&wd[d])n++;}return n;}
function setView(v){S.view=v;['workout','overview','diet','settings'].forEach(t=>{document.getElementById('tab'+t[0].toUpperCase()+t.slice(1))?.classList.toggle('active',t===v);});renderMain();}
function selectDay(i){S.day=i;renderNav();if(S.view==='workout')renderMain();}
function renderNav(){
  document.getElementById('dayNav').innerHTML=DAYS.map((d,i)=>{
    const done=isDone(S.week,d.id);
    return`<div class="day-chip ${i===S.day?'active':''} ${done?'done':''}" onclick="selectDay(${i})">
      <span class="chip-icon">${d.icon}</span><span class="chip-label">${d.label}</span><span class="chip-tag">${d.tag}</span></div>`;}).join('');}
function renderMain(){const el=document.getElementById('mainScroll');
  if(S.view==='overview'){renderOverview(el);return;}
  if(S.view==='settings'){renderSettings(el);return;}
  if(S.view==='diet'){renderDiet(el);return;}
  renderWorkout(el);}

function renderWorkout(el){
  const day=DAYS[S.day],w=S.week,done=isDone(w,day.id);

    <div class="hero-info"><div class="hero-name">${day.name}</div><div class="hero-sub">Týden ${w} · ${day.tag}</div></div>
    ${!day.rest?`<button class="done-btn ${done?'done':''}" onclick="markDay('${day.id}')">${done?'✓ Hotovo':'Dokončit'}</button>`:''}

  if(day.rest){
    h+=`<div class="rest-screen"><div class="rest-emoji">${day.icon}</div><div class="rest-title">${day.name}</div><div class="rest-body">${day.note}</div></div>`;
  } else {
    h+=`<div class="note-banner">${day.note}</div>`;
    day.exercises.forEach((ex,ei)=>{
      const pd=S.data?.[w-1]?.[day.id]?.[ei];
      const prevKgs=pd?Object.values(pd).filter(x=>x.kg).map(x=>x.kg+'kg').join(', '):null;

      const ytQuery=encodeURIComponent(ex.yt||ex.name);
      const ytUrl=`https://www.youtube.com/results?search_query=${ytQuery}`;
      h+=`<div class="ex-card" id="ec${ei}">
        <div class="ex-head" onclick="toggleEx(${ei})">
          <div class="ex-num">${ei+1}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}<span class="mtag t-${ex.tag}">${ex.tag}</span></div>
            <div class="ex-meta">${ex.sets.length} sety · ${ex.reps} reps</div></div>
          <span class="ex-arrow">▾</span></div>
        <div class="ex-body">
          <div class="ex-demo">
            ${ex.img?`<div class="ex-img-wrap"><img src="${ex.img}" alt="${ex.name}" loading="lazy"></div>`:''}
            <div class="ex-demo-right">
              <div class="ex-note">${ex.note}</div>
              <a href="${ytUrl}" target="_blank" class="yt-btn">▶ YouTube demo</a>
            </div>
          </div>
          <div class="sets-head"><span>Set</span><span>Váha kg</span><span>Reps</span><span>✓</span></div>`;
      ex.sets.forEach((s,si)=>{
        const d=getSD(w,day.id,ei,si);
        const pw=pd?.[si]?.kg||'';const pr=pd?.[si]?.reps||ex.reps.split('–')[0];
        h+=`<div class="set-row">
          <div class="set-lbl ${s.w?'warm':''}">${s.w?'W':si+1}</div>
          <input class="set-inp" type="number" step="0.5" min="0" inputmode="decimal"
            placeholder="${pw||'kg'}" value="${d.kg}"
            oninput="putSD(${w},'${day.id}',${ei},${si},'kg',this.value)">
          <input class="set-inp" type="number" min="0" inputmode="numeric"
            placeholder="${pr}" value="${d.reps}"
            oninput="putSD(${w},'${day.id}',${ei},${si},'reps',this.value)">
          <button class="set-chk ${d.done?'done':''}" id="chk_${ei}_${si}"
            onclick="toggleChk(${w},'${day.id}',${ei},${si})">${d.done?'✓':''}</button>
        </div>`;});
      if(prevKgs)h+=`<div class="prev-hint">📈 Min. týden: <span>${prevKgs}</span></div>`;
      h+=`</div></div>`;});
  }
  el.innerHTML=h;el.scrollTop=0;}

function toggleEx(i){document.getElementById('ec'+i)?.classList.toggle('open');}
function toggleChk(w,id,ei,si){
  const cur=getSD(w,id,ei,si).done;putSD(w,id,ei,si,'done',!cur);
  const btn=document.getElementById(`chk_${ei}_${si}`);
  if(btn){btn.classList.toggle('done',!cur);btn.textContent=!cur?'✓':'';}
  if(!cur)vibrate();}
function markDay(id){
  toggleDone(S.week,id);const done=isDone(S.week,id);renderNav();
  const btn=document.querySelector('.done-btn');
  if(btn){btn.classList.toggle('done',done);btn.textContent=done?'✓ Hotovo':'Dokončit';}
  if(done){vibrate();toast('✅ Trénink dokončen!');}}

function renderOverview(el){

  </div>
  <div class="week-nav-row">
    <button onclick="changeOvWeek(-1)">‹</button>
    <span>Týden ${S.ovWeek} / ${WEEKS}</span>
    <button onclick="changeOvWeek(1)">›</button>
  </div>`;
  for(let w=1;w<=WEEKS;w++){const cnt=weekWorkouts(w);
    h+=`<div class="week-section">
      <div class="week-title">
        <span ${w===S.week?'style="color:var(--accent)"':''}>${w===S.week?'▶ ':''}Týden ${w}</span>
        <span>${cnt}/5 tréninků</span></div>
      <div class="week-dots">${DAYS.map(d=>{const done=isDone(w,d.id);
        return`<div class="w-dot ${done?'completed':''} ${d.rest?'rest-d':''} ${w===S.week?'cur-week':''}"
          onclick="jumpToDay(${w},'${d.id}')" title="${d.name}">${d.rest?d.icon:''}</div>`;
      }).join('')}</div></div>`;}
  el.innerHTML=h;el.scrollTop=0;}

function changeOvWeek(d){const nw=S.ovWeek+d;if(nw<1||nw>WEEKS)return;S.ovWeek=nw;save();renderMain();}
function jumpToDay(w,id){S.week=w;S.day=DAYS.findIndex(d=>d.id===id);S.ovWeek=w;

function resetConfirm(){if(confirm('Opravdu smazat všechna data?')){S.data={};S.done={};save();toast('🗑 Data smazána');renderMain();}}
async function toggleNotif(enabled){
  if(enabled){if(!('Notification'in window)){toast('❌ Notifikace nepodporovány');return;}
    const p=await Notification.requestPermission();
    if(p!=='granted'){toast('❌ Povolení zamítnuto');document.getElementById('notifToggle').checked=false;return;}}
  S.notifEnabled=enabled;save();toast(enabled?'🔔 Připomínky zapnuty':'🔕 Připomínky vypnuty');}
function testNotif(){if(!('Notification'in window)){toast('❌ Nepodporovány');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){new Notification('💪 Split Tracker',{body:`Dnes: ${DAYS[S.day].name} – Týden ${S.week}`});toast('🔔 Test odeslán!');}
    else toast('❌ Povolení zamítnuto');});}
function vibrate(){if(navigator.vibrate)navigator.vibrate(40);}
let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}

if('serviceWorker'in navigator){
  const swCode=`const CACHE='split-v3';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});}

      <div class="meal-body">
        <div class="ing-head">
          <span>Ingredience</span><span>Množství</span><span>kcal</span><span>P</span><span>C</span><span>F</span>
        </div>`;
    meal.items.forEach(item=>{
      h+=`<div class="ing-row">
        <div class="ing-name">${item.name}</div>
        <div class="ing-amt">${item.amt}</div>
        <div class="ing-val" style="color:var(--orange)">${item.kcal}</div>
        <div class="ing-val" style="color:var(--accent2)">${item.p}g</div>
        <div class="ing-val" style="color:var(--yellow)">${item.c}g</div>
        <div class="ing-val" style="color:var(--green)">${item.f}g</div>
      </div>`;});
    h+=`<div class="meal-total">
        <span>${meal.items.length} ingrediencí</span>
        <strong>${totalKcal} kcal · ${totalP}g protein</strong>
      </div>
    </div></div>`;});
  el.innerHTML=h;el.scrollTop=0;
}

function toggleMeal(i){document.getElementById('mc'+i)?.classList.toggle('open');}

load();
document.getElementById('weekPill').textContent=`Week ${S.week}`;
renderNav();renderMain();
</script>
</body>
</html>
